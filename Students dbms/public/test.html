<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
</head>
<body>
    <h1>API Test Page</h1>
    
    <div>
        <h2>Add Student Test</h2>
        <button onclick="testAddStudent()">Test Add Student</button>
        <button onclick="testGetStudents()">Test Get Students</button>
        <div id="result"></div>
    </div>

    <script>
        async function testAddStudent() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                const response = await fetch('/api/students', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        roll_number: 'TEST' + Date.now(),
                        first_name: 'Test',
                        last_name: 'Student',
                        email: 'test@example.com',
                        class: '10th',
                        section: 'A'
                    })
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const text = await response.text();
                console.log('Response text:', text);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${text}`);
                }
                
                const data = JSON.parse(text);
                resultDiv.innerHTML = `<strong>Success:</strong> ${JSON.stringify(data)}`;
                
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `<strong>Error:</strong> ${error.message}`;
            }
        }
        
        async function testGetStudents() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Getting students...';
            
            try {
                const response = await fetch('/api/students');
                const students = await response.json();
                resultDiv.innerHTML = `<strong>Students:</strong> <pre>${JSON.stringify(students, null, 2)}</pre>`;
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `<strong>Error:</strong> ${error.message}`;
            }
        }
    </script>
</body>
</html>
